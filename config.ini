; https://github.com/vike256/Unibot
; See Unibot Wiki for reference

[aim]
; winapi
; interception_driver
; microcontroller_serial
; microcontroller_socket
bot_input_type = kmbox
screen_center_offset = 0
aim_smoothing_factor = 0.0
speed = 1.0
y_speed_multiplier = 1.0
aim_height = 0.5

[communication]
; IF USING TYPE SOCKET
microcontroller_ip = 0.0.0.0
microcontroller_port = 50256

; IF USING TYPE SERIAL
com_port = 1

[screen]
group_close_target_blobs_threshold = 3, 3

; HSV color range for target detection
upper_color = 63, 255, 255
lower_color = 58, 210, 80

capture_fov_x = 256
capture_fov_y = 256
aim_fov_x = 256
aim_fov_y = 256
max_loops_per_sec = 60
auto_detect_resolution = true
resolution_x = 1920
resolution_y = 1080

[recoil]
mode = move
recoil_x = 0.0
recoil_y = 0.0
max_offset = 100
recover = 0.0

[trigger]
; Base delay for triggerbot
trigger_delay = 0
; Additional random delay, does nothing if trigger_delay is 0
trigger_randomization = 30
trigger_threshold = 8

[rapid_fire]
; Maximum clicks per second sent by Unibot, used for triggerbot and rapidfire
target_cps = 10

[key_binds]
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; F1
key_reload_config = 0x70
; F2
key_toggle_aim = 0x71
; F3
key_toggle_recoil = 0x72
; F4
key_exit = 0x73
; Mouse 4
key_trigger = 0x06
; Mouse5
key_rapid_fire = 0x05
; Mouse1 & Mouse2
aim_keys = 0x01, 0x02

[shape_validation]
; Enable geometric shape filtering to reduce false positives
enabled = true
; Check aspect ratio (height/width): 0.3-0.8 is human-like
check_aspect_ratio = true
aspect_ratio_min = 0.3
aspect_ratio_max = 0.8
; Check blob area (pixel count): filter noise and massive objects
check_area_threshold = true
min_blob_area = 20
max_blob_area = 50000
; Check convexity (0-1): how smooth/regular the shape is
check_convexity = true
min_convexity_score = 0.3
; Check solidity (0-1): how filled vs. fragmented the blob is
check_solidity = true
min_solidity_score = 0.5
; Prefer taller shapes (vertical bias): reduce sky/wall false positives
check_vertical_bias = true
vertical_bias_threshold = 0.8

[pose_detection]
; Detect player stance: standing, crouching, prone
; Thresholds are aspect ratios (height/width). Tune per-game.
; Standing: narrow/tall (high aspect ratio)
pose_standing_threshold = 1.2
; Crouching: medium aspect ratio
pose_crouching_threshold = 0.7
; Prone: wide/flat (low aspect ratio)
pose_prone_threshold = 0.4

; Aim lead (head position offset) per pose (0.0-1.0, where 0.5 is center)
; Standing: aim higher (chest/head)
pose_lead_standing = 0.4
; Crouching: aim slightly lower than standing
pose_lead_crouching = 0.5
; Prone: aim at center mass
pose_lead_prone = 0.6

[debug]
; Show a debug screen
enabled = true
; Refresh debug screen even if cheats are off
always_on = true
; 'game' shows actual screen, 'mask' shows what opencv sees
display_mode = mask

[kmbox]
; IP address shown on KMBox Net LCD screen
kmbox_ip = 192.168.1.100
; Port shown on KMBox Net LCD screen (default 6234)
kmbox_port = 6234
; UUID shown on KMBox Net LCD screen (8 hex chars, no spaces)
kmbox_uid = XXXXXXXX

[capture]
; V4L2 device path on Linux
device = /dev/video0
capture_width = 1920
capture_height = 1080
capture_fps = 120
; Actual game output resolution — used for coordinate scaling
game_width = 2560
game_height = 1440

[detection]
; 'color' = HSV only (fast, original behavior)
; 'hybrid' = HSV pre-filter + YOLOv11-nano confirmation on ROI
mode = color
yolo_model = models/yolo11n.pt
yolo_confidence = 0.5
